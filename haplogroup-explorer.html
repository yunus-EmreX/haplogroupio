<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haplogroup Explorer — İnsan Göç Atlası</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
:root{
  --bg:#030810;--panel:rgba(5,12,28,.94);--border:rgba(80,160,255,.14);
  --text:#b0c8e4;--dim:#3a5272;--bright:#ddeeff;
  --accent:#00d4ff;--gold:#ffb830;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;}
#nebula{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 20% 30%,rgba(0,60,140,.18) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 70%,rgba(80,0,120,.12) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 60% 20%,rgba(0,30,80,.2) 0%,transparent 70%);}
#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
header{position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  padding:10px 24px 8px;
  background:linear-gradient(to bottom,rgba(3,8,16,.99) 60%,transparent);}
header h1{font-family:'Cinzel',serif;font-size:clamp(1.05rem,1.8vw,1.5rem);font-weight:700;
  letter-spacing:.32em;
  background:linear-gradient(120deg,#80d8ff 0%,#00d4ff 38%,#ffb830 68%,#ff8c42 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
header p{font-size:.63rem;letter-spacing:.36em;color:var(--dim);margin-top:2px;}
.hline{position:fixed;top:61px;left:0;right:0;height:1px;z-index:99;
  background:linear-gradient(to right,transparent,var(--accent),var(--gold),var(--accent),transparent);
  animation:hpulse 3s ease-in-out infinite;}
@keyframes hpulse{0%,100%{opacity:.3;}50%{opacity:.9;}}
#app{display:grid;grid-template-columns:248px 1fr 270px;height:100vh;padding-top:63px;position:relative;z-index:1;}
/* LEFT */
.haplo-panel{padding:10px 8px;overflow-y:auto;border-right:1px solid var(--border);
  background:var(--panel);backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:5px;}
.haplo-panel::-webkit-scrollbar{width:3px;}
.haplo-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.panel-title{font-family:'Space Mono',monospace;font-size:.59rem;letter-spacing:.22em;color:var(--dim);
  text-transform:uppercase;padding:6px 6px 10px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.hcard{position:relative;padding:9px 11px;border-radius:7px;cursor:pointer;
  border:1px solid transparent;background:rgba(255,255,255,.025);
  transition:all .22s cubic-bezier(.4,0,.2,1);overflow:hidden;
  opacity:0;transform:translateX(-8px);}
.hcard.visible{opacity:1;transform:translateX(0);}
.hcard::before{content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,var(--cc,#00d4ff) 0%,transparent 65%);transition:opacity .3s;}
.hcard:hover::before,.hcard.active::before{opacity:.09;}
.hcard:hover,.hcard.active{border-color:var(--cc,#00d4ff);background:rgba(255,255,255,.05);transform:translateX(5px);}
.hcard.active{box-shadow:0 0 18px rgba(0,0,0,.6),-3px 0 14px var(--cc,#00d4ff),0 0 0 1px var(--cc,#00d4ff);}
.ct{display:flex;align-items:center;gap:9px;margin-bottom:3px;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--cc,#00d4ff);box-shadow:0 0 8px var(--cc,#00d4ff);flex-shrink:0;}
.hname{font-family:'Space Mono',monospace;font-size:.9rem;font-weight:700;color:var(--bright);}
.badge{margin-left:auto;font-size:.54rem;letter-spacing:.1em;padding:2px 6px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--dim);}
.hdesc{font-size:.74rem;color:var(--dim);line-height:1.35;padding-left:18px;}
/* GLOBE */
.globe-section{display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;gap:10px;overflow:hidden;}
#globe-svg{filter:drop-shadow(0 0 50px rgba(0,80,180,.3));cursor:grab;}
#globe-svg:active{cursor:grabbing;}
.legend{display:flex;align-items:center;gap:9px;font-size:.61rem;letter-spacing:.13em;color:var(--dim);}
.lbar{width:130px;height:5px;border-radius:3px;transition:background .6s;}
.glabel{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;}
/* INFO */
.info-panel{padding:18px 15px;overflow-y:auto;border-left:1px solid var(--border);
  background:var(--panel);backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:14px;}
.info-panel::-webkit-scrollbar{width:3px;}
.info-panel::-webkit-scrollbar-thumb{background:var(--border);}
.iname{font-family:'Cinzel',serif;font-size:2.3rem;font-weight:700;line-height:1;transition:color .5s,text-shadow .5s;}
.ifull{font-size:.8rem;color:var(--dim);letter-spacing:.1em;margin-top:4px;}
.idiv{height:1px;opacity:.4;}
.sec-title{font-family:'Space Mono',monospace;font-size:.57rem;letter-spacing:.25em;color:var(--dim);text-transform:uppercase;margin-bottom:7px;}
.stat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.sl{font-size:.75rem;color:var(--dim);}
.sv{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--bright);}
.regions{display:flex;flex-direction:column;gap:5px;}
.ritem{display:flex;align-items:center;gap:7px;}
.rname{font-size:.75rem;color:var(--text);min-width:90px;}
.rbar-wrap{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.rbar{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1),background .5s;}
.rpct{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--dim);min-width:34px;text-align:right;}
.idesc{font-size:.79rem;line-height:1.65;color:var(--dim);}
/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:100%;color:var(--dim);font-size:.74rem;letter-spacing:.22em;}
.spinner{width:36px;height:36px;border:2px solid rgba(0,212,255,.18);border-top-color:#00d4ff;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* TOOLTIP */
#tip{position:fixed;pointer-events:none;z-index:500;background:rgba(5,12,28,.97);border:1px solid var(--border);padding:7px 11px;border-radius:6px;backdrop-filter:blur(10px);opacity:0;transition:opacity .15s;}
#tip.on{opacity:1;}
#tip-name{font-size:.77rem;color:var(--bright);font-weight:600;margin-bottom:2px;}
#tip-freq{font-family:'Space Mono',monospace;font-size:.69rem;color:var(--accent);}
</style>
</head>
<body>
<div id="nebula"></div>
<canvas id="stars-canvas"></canvas>
<header>
  <h1>HAPLOGROUP EXPLORER</h1>

/* ═══════════════ STARS ═══════════════ */
function initStars(){
  const cv=document.getElementById('stars-canvas');
  const cx=cv.getContext('2d');
  const resize=()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;};
  resize();window.addEventListener('resize',resize);
  const s=Array.from({length:360},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.15,op:Math.random()*.5+.1,ph:Math.random()*Math.PI*2,sp:Math.random()*.016+.004}));
  function draw(ts){
    const t=ts/1000;cx.clearRect(0,0,cv.width,cv.height);
    s.forEach(st=>{const a=st.op*(.55+.45*Math.sin(t*st.sp+st.ph));cx.beginPath();cx.arc(st.x*cv.width,st.y*cv.height,st.r,0,Math.PI*2);cx.fillStyle=`rgba(170,205,255,${a})`;cx.fill();});
    requestAnimationFrame(draw);
  }requestAnimationFrame(draw);
}

/* ═══════════════ COLOR ═══════════════ */
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function cc(id,hg){
  const f=hg.c[id];
  if(!f||f<.015)return'#0b1a30';
  const[r,g,b]=h2r(hg.color);
  const t=Math.pow(Math.min(f/.85,1),.7);
  return`rgb(${Math.round(11+(r-11)*t)},${Math.round(26+(g-26)*t)},${Math.round(48+(b-48)*t)})`;
}

/* ═══════════════ CARDS ═══════════════ */
function renderCards(){
  const p=document.getElementById('haplo-panel');
  p.innerHTML='<div class="panel-title">// Haplogroup Seç</div>';
  HG.forEach((h,i)=>{
    const d=document.createElement('div');
    d.className='hcard'+(h.id===sel.id?' active':'');
    d.style.cssText=`--cc:${h.color};`;
    d.innerHTML=`<div class="ct"><div class="dot"></div><span class="hname">${h.id}</span><span class="badge">Y-DNA</span></div><div class="hdesc">${h.top[0].n} · ${h.top[1].n}</div>`;
    d.addEventListener('click',()=>pick(h));
    p.appendChild(d);
    setTimeout(()=>d.classList.add('visible'),i*55+20);
  });
}

/* ═══════════════ INFO ═══════════════ */

/* ═══════════════ GLOBE ═══════════════ */
async function initGlobe(){
  try{
    const raw=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const countries=topojson.feature(raw,raw.objects.countries);
    document.getElementById('loading').style.display='none';
    const sv=document.getElementById('globe-svg');sv.style.display='block';
    document.getElementById('legend').style.display='flex';
    document.getElementById('glabel').textContent='↻ Döndürmek için sürükleyin';
    buildGlobe(countries);renderCards();renderInfo(sel);updateLegend(sel);
  }catch(e){
    document.getElementById('loading').innerHTML='<div style="color:#ef5350;font-size:.9rem;">⚠ Harita yüklenemedi</div><div style="font-size:.68rem;opacity:.5;margin-top:6px;">İnternet bağlantısını kontrol edin</div>';
  }
}

function buildGlobe(countries){
  const cont=document.querySelector('.globe-section');
  const W=cont.clientWidth,H=cont.clientHeight-80;
  const R=Math.min(W,H)/2-18;
  const svg=d3.select('#globe-svg').attr('width',W).attr('height',H);
  gSvg=svg;

  const defs=svg.append('defs');
  const f1=defs.append('filter').attr('id','af').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  f1.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','18').attr('result','b');
  const m1=f1.append('feMerge');m1.append('feMergeNode').attr('in','b');m1.append('feMergeNode').attr('in','SourceGraphic');
  const og=defs.append('radialGradient').attr('id','og').attr('cx','44%').attr('cy','37%').attr('r','52%');
  og.append('stop').attr('offset','0%').attr('stop-color','#102344');
  og.append('stop').attr('offset','100%').attr('stop-color','#050d1a');

  proj=d3.geoOrthographic().scale(R).translate([W/2,H/2]).rotate([25,-18,0]).clipAngle(90);
  gPath=d3.geoPath().projection(proj);
  const g=svg.append('g');

  g.append('circle').attr('cx',W/2).attr('cy',H/2).attr('r',R+8).attr('fill','none')
    .attr('stroke',sel.color).attr('stroke-width',10).attr('opacity',.06).attr('id','aring').attr('filter','url(#af)');

  g.append('circle').attr('cx',W/2).attr('cy',H/2).attr('r',R).attr('fill','url(#og)');

  g.append('path').datum(d3.geoGraticule()()).attr('d',gPath).attr('fill','none')
    .attr('stroke','rgba(80,150,220,.07)').attr('stroke-width',.5).attr('id','grat');

  g.selectAll('.cty').data(countries.features).join('path').attr('class','cty')
    .attr('d',gPath).attr('fill',d=>cc(+d.id,sel))
    .attr('stroke','rgba(80,140,210,.18)').attr('stroke-width',.35)
    .on('mousemove',(ev,d)=>{
      const id=+d.id,name=CN[id]||'—',f=sel.c[id];
      document.getElementById('tip-name').textContent=name;
      document.getElementById('tip-freq').textContent=f?`${sel.id}: %${Math.round(f*100)}`:`${sel.id}: < %1`;
      const t=document.getElementById('tip');t.style.left=(ev.clientX+14)+'px';t.style.top=(ev.clientY-38)+'px';t.classList.add('on');
    }).on('mouseleave',()=>document.getElementById('tip').classList.remove('on'));

  g.append('circle').attr('cx',W/2).attr('cy',H/2).attr('r',R).attr('fill','none')
    .attr('stroke',sel.color).attr('stroke-width',1.2).attr('opacity',.45).attr('id','rim');

  svg.call(d3.drag()
    .on('start',()=>{autoRot=false;dragging=true;})
    .on('drag',(ev)=>{const r=proj.rotate();proj.rotate([r[0]+ev.dx*.38,r[1]-ev.dy*.38]);redraw();})
    .on('end',()=>{dragging=false;clearTimeout(rotTmr);rotTmr=setTimeout(()=>{autoRot=true;},3000);}));

  let lt=0;
  function anim(t){
    if(autoRot&&!dragging&&t-lt>16){const r=proj.rotate();proj.rotate([r[0]+.13,r[1]]);redraw();lt=t;}
    requestAnimationFrame(anim);
  }requestAnimationFrame(anim);
}

function redraw(){
  if(!gPath)return;
  gSvg.select('#grat').attr('d',gPath(d3.geoGraticule()()));
  gSvg.selectAll('.cty').attr('d',gPath);
}

function updateGlobeColors(h){
  if(!gSvg)return;
  gSvg.selectAll('.cty').transition().duration(650).attr('fill',d=>cc(+d.id,h));
  gSvg.select('#rim').transition().duration(650).attr('stroke',h.color);
  gSvg.select('#aring').transition().duration(650).attr('stroke',h.color);
}

function updateLegend(h){
  document.getElementById('lbar').style.background=`linear-gradient(to right,#0d1f3c,${h.color})`;
}

/* ═══════════════ PICK ═══════════════ */
function pick(h){
  sel=h;updateGlobeColors(h);updateLegend(h);renderInfo(h);
  document.querySelectorAll('.hcard').forEach((c,i)=>c.classList.toggle('active',HG[i].id===h.id));
}

/* ═══════════════ BOOT ═══════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  initStars();renderCards();renderInfo(sel);initGlobe();
});
</script>
</body>
</html>
